
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html5</title>
</head>
<body>
    <h1>imagens dinamicas</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou diminua o tamanho do seu navegador</p>
    <picture>

        <source media="(max-width: 700px )" srcset="foto.p.png" type="imagem/png">
        <source media="(max-width: 1000px )" srcset="foto.m.png" type="image/png">
        <img src="foto.g.png" alt="flexivel">
    </picture>
    <h1>reproduzindo audio</h1>
    <p>vamos aprender a colocar audio em seu site</p>
    <audio src="midia/Ruff Money - The Grey Room _ Clark Sims.mp3"controls autoplay></audio>
</body>
</html>
